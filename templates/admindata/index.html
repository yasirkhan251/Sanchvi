{%extends 'admindata/adminbase.html'%}
{%block title%} Admin-Panel {%endblock%}
{%block content%}
<h2>Server Mode</h2>
<form id="serverModeForm">
    <label class="switch">
        <input type="checkbox" id="serverModeToggle">
        <span class="slider round"></span>
    </label>
</form>

<script>
window.onload = function() {
    // Fetch the current server mode from the backend
    fetch("{% url 'get_server_mode' %}")
        .then(response => response.json())
        .then(data => {
            // Set the toggle switch based on the server mode value
            document.getElementById('serverModeToggle').checked = data.servermode;
        })
        .catch(error => {
            console.error('Error fetching server mode:', error);
        });
};

document.getElementById('serverModeToggle').addEventListener('change', function() {
    const servermode = this.checked;  // Get the status of the toggle switch (true or false)
    
    fetch("{% url 'toggle_server_mode' %}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}',  // Add CSRF token for security
        },
        body: JSON.stringify({
            'servermode': servermode
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log('Success:', data);
    })
    .catch(error => {
        console.error('Error:', error);
    });
});
</script>

    <style>
        .switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  transition: .4s;
}

input:checked + .slider {
  background-color: #2196F3;
}

input:checked + .slider:before {
  transform: translateX(26px);
}

.slider.round {
  border-radius: 34px;
}

.slider.round:before {
  border-radius: 50%;
}

    </style>
{%endblock%}
